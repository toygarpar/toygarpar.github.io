<!DOCTYPE HTML>
<html lang="tr">
<head>
    <title>Photography Portfolio | Toygar Par</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --lal: #BC243C;
            --lapis: #F4C430; /* Saffron Glow */
            --fildisi: #F2E8CF;
            --altin: #D4AF37;
            --koyu: #1A1714;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--koyu);
            color: var(--fildisi);
            font-family: var(--font-sans);
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }

        /* Header & Brand */
        header { 
            border-left: 15px solid var(--lal); 
            padding-left: 2.5rem; 
            margin-bottom: 5rem; 
            position: relative;
        }

        h1 { 
            font-family: var(--font-serif);
            font-size: clamp(3.5rem, 10vw, 6rem); 
            font-weight: 900; 
            font-style: italic;
            text-transform: none; /* Serif fontun karakteri için küçük harfe izin veriyoruz */
            margin: 0; 
            letter-spacing: -2px;
            line-height: 0.85;
            color: var(--fildisi);
        }

        .subtitle { 
            font-family: var(--font-sans);
            color: var(--lapis); 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            font-size: 0.9rem;
            margin-top: 15px;
            display: block;
        }

        /* Gallery Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: #25221f;
            border: 1px solid rgba(242, 232, 207, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--altin);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card-image {
            height: 400px;
            width: 100%;
            object-fit: cover;
            filter: contrast(115%) brightness(85%) grayscale(10%);
            transition: 0.6s ease-out;
        }

        .card:hover .card-image { 
            filter: contrast(125%) brightness(100%) grayscale(0%); 
            transform: scale(1.05);
        }

        .card-info { 
            padding: 2rem; 
            background: linear-gradient(to top, var(--koyu) 20%, transparent);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .card-title { 
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--fildisi); 
            font-size: 2rem; 
            font-weight: 900; 
            margin: 0;
            line-height: 1;
        }

        .card-count { 
            font-family: var(--font-sans);
            color: var(--lal); 
            font-weight: 900; 
            font-size: 0.75rem; 
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* Footer */
        footer { 
            margin-top: 8rem; 
            border-top: 1px solid rgba(242, 232, 207, 0.1); 
            padding: 3rem 0; 
            font-family: var(--font-sans);
            font-size: 0.7rem; 
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.5;
            display: flex;
            justify-content: space-between;
        }
        
        a { color: inherit; text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--altin); }
        
        @media (max-width: 768px) {
            header { border-left-width: 10px; padding-left: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
