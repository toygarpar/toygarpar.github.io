<!DOCTYPE HTML>
<html lang="tr">
<head>
    <title>Photography Portfolio | Toygar Par</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* Ottoman Bold Pop Core Colors */
        :root {
            --lal: #BC243C; /* Lal Kırmızısı */
            --lapis: #0047AB; /* Lapis Mavisi */
            --fildisi: #F2E8CF; /* Fildişi */
            --altin: #D4AF37; /* Altın */
            --koyu: #1A1714; /* Koyu Karbon */
        }

        body {
            background-color: var(--koyu);
            color: var(--fildisi);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }

        /* Header & Brand */
        header { border-left: 12px solid var(--lal); padding-left: 2rem; margin-bottom: 5rem; }
        h1 { 
            font-size: clamp(3rem, 8vw, 5rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: -3px;
            line-height: 0.9;
        }
        .subtitle { 
            color: var(--lapis); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* Gallery Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #25221f;
            border: 1px solid rgba(242, 232, 207, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--altin);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-image {
            height: 300px;
            width: 100%;
            object-fit: cover;
            filter: contrast(110%) brightness(90%);
            transition: 0.4s;
        }

        .card:hover .card-image { filter: contrast(120%) brightness(100%); }

        .card-info { padding: 1.5rem; background: linear-gradient(to top, var(--koyu), transparent); }
        .card-title { 
            color: var(--fildisi); 
            font-size: 1.5rem; 
            font-weight: 800; 
            margin: 0;
            text-transform: uppercase;
        }
        .card-count { color: var(--lal); font-weight: 700; font-size: 0.9rem; }

        /* Footer */
        footer { margin-top: 6rem; border-top: 1px solid rgba(242, 232, 207, 0.1); padding-top: 2rem; display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.6; }
        
        a { color: inherit; text-decoration: none; }
        
        @media (max-width: 768px) {
            header { border-left-width: 8px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" style="font-weight: 800; color: var(--lapis);">toygarpar.com.tr</a>
            <h1>Photography<br>Portfolio</h1>
            <div class="subtitle">Ottoman Bold Pop Aesthetic</div>
        </header>

        <div class="grid">
            {% for cat in categories %}
            <a href="{{ cat.slug }}.html" class="card">
                {% if cat.images %}
                    <img src="assets/photography/{{ cat.slug }}/{{ cat.images[0] }}" class="card-image" alt="{{ cat.title }}">
                {% else %}
                    <div style="height: 300px; background: var(--lapis); display: flex; align-items: center; justify-content: center; font-weight: 900; opacity: 0.3;">
                        NO IMAGES YET
                    </div>
                {% endif %}
                <div class="card-info">
                    <div class="card-count">{{ cat.image_count }} WORKS</div>
                    <h2 class="card-title">{{ cat.title }}</h2>
                </div>
            </a>
            {% endfor %}
        </div>

        <footer>
            <div>&copy; 2026 toygarpar.com.tr</div>
            <div>
                <a href="index.html">Home</a> &nbsp; | &nbsp; 
                <a href="Resume/index.html">Resume</a> &nbsp; | &nbsp; 
                <a href="still.html">Still Life</a>
            </div>
        </footer>
    </div>

</body>
</html>
